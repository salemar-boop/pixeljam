<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2d1f14" />
  <title>Memory Jam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app" class="app">
    <header class="top-bar">
      <button type="button" class="btn-icon" id="btn-menu" aria-label="Menu">≡</button>
      <h1 class="logo"><a href="#home" class="logo-link">Memory Jam</a></h1>
      <span class="top-spacer"></span>
    </header>

    <nav class="drawer" id="drawer" hidden>
      <button type="button" class="drawer-close" id="drawer-close" aria-label="Close">×</button>
      <a href="#home" class="nav-link">Home</a>
      <a href="#jars" class="nav-link">My jars</a>
      <a href="#import" class="nav-link">Import jar</a>
    </nav>
    <div class="drawer-scrim" id="drawer-scrim" hidden></div>

    <main class="main" id="main"></main>

    <div class="modal" id="modal-memory" hidden>
      <div class="modal-card pixel-border">
        <button type="button" class="modal-close" id="modal-memory-close" aria-label="Close">×</button>
        <p class="modal-label">A memory floats up…</p>
        <img id="modal-memory-img" alt="" />
        <p class="modal-caption" id="modal-memory-caption"></p>
      </div>
    </div>

    <div class="modal" id="modal-new-jar" hidden>
      <div class="modal-card pixel-border small">
        <h2 class="modal-title">New jar</h2>
        <label class="field">
          <span>Name</span>
          <input type="text" id="new-jar-name" maxlength="40" placeholder="Summer 2026" autocomplete="off" />
        </label>
        <div class="modal-actions">
          <button type="button" class="btn secondary" id="new-jar-cancel">Cancel</button>
          <button type="button" class="btn primary" id="new-jar-save">Create</button>
        </div>
      </div>
    </div>

    <input type="file" id="camera-input" accept="image/*" capture="environment" hidden />
    <input type="file" id="import-file" accept=".json,application/json" hidden />
  </div>
  <script src="js/prompts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
