<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1c1412" />
    <meta name="description" content="Memory Jam — a cozy pixel journal. One daily photo prompt, memories in jars you can shake." />
    <title>Memory Jam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app">
      <header class="top-bar">
        <span class="top-spacer" aria-hidden="true"></span>
        <h1 class="logo">
          <a class="logo-link" href="#home">Memory Jam</a>
        </h1>
        <button type="button" class="btn-icon" id="btn-menu" aria-label="Open menu" title="Menu">
          ☰
        </button>
      </header>

      <main class="main" id="main"></main>

      <footer class="app-footer" id="app-footer" hidden></footer>
    </div>

    <div class="drawer-scrim" id="drawer-scrim" hidden></div>
    <nav class="drawer" id="drawer" hidden aria-label="Main menu">
      <button type="button" class="drawer-close" id="drawer-close" aria-label="Close menu">
        ×
      </button>
      <a class="nav-link" href="#home">Home</a>
      <a class="nav-link" href="#jars">My jars</a>
      <a class="nav-link" href="#import">Import jar</a>
    </nav>

    <div class="modal" id="modal-memory" hidden role="dialog" aria-modal="true" aria-labelledby="modal-memory-title">
      <div class="modal-card pixel-border">
        <button type="button" class="modal-close" id="modal-memory-close" aria-label="Close">×</button>
        <p class="modal-title" id="modal-memory-title">A memory floats up…</p>
        <p class="modal-memory-date" id="modal-memory-date" hidden></p>
        <img id="modal-memory-img" src="" alt="" />
        <p class="modal-caption" id="modal-memory-caption"></p>
      </div>
    </div>

    <div class="modal" id="modal-new-jar" hidden role="dialog" aria-modal="true" aria-labelledby="modal-new-jar-title">
      <div class="modal-card small pixel-border">
        <p class="modal-title" id="modal-new-jar-title">New jar</p>
        <div class="field">
          <span>Name your jar</span>
          <input type="text" id="new-jar-name" maxlength="80" placeholder="e.g. Summer 2026" autocomplete="off" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn ghost" id="new-jar-cancel">Cancel</button>
          <button type="button" class="btn primary" id="new-jar-save">Create</button>
        </div>
      </div>
    </div>

    <input type="file" id="camera-input" accept="image/*" hidden aria-hidden="true" tabindex="-1" />
    <input type="file" id="import-file" accept="application/json,.json" hidden aria-hidden="true" tabindex="-1" />

    <script src="js/prompts.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
